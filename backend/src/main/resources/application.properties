spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${APP_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${APP_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.datasource.hikari.initializationFailTimeout=0
spring.datasource.hikari.connectionTimeout=${APP_DB_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.validationTimeout=${APP_DB_VALIDATION_TIMEOUT_MS:3000}
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
